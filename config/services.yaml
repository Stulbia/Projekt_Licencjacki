parameters:
    files_directory: '%kernel.project_dir%/public/uploads'


services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\FileUploadService:
        arguments:
            $targetDirectory: '%files_directory%'



    App\Service\BookService:
        arguments:
            $targetDirectory: '%files_directory%'

    App\Security\AccessDeniedHandler:
        tags:
            - { name: 'monolog.logger', channel: 'security' }

    App\Resolver\BookListInputFiltersDtoResolver:
        tags:
            - { name: 'controller.argument_value_resolver' }

    App\Resolver\ReviewSearchFiltersDtoResolver:
        tags:
            - { name: 'controller.argument_value_resolver' }


    App\EventListener\AccessDeniedListener:
        tags:
            - { name: 'kernel.event_listener', event: 'kernel.exception', method: 'onKernelException' }

    App\Security\UserChecker:
        tags:
            - { name: 'security.user_checker', alias: 'app.user_checker' }

    App\Form\Type\BookType:
        arguments:
            - '@App\Form\DataTransformer\TagsDataTransformer'
            - '@security.authorization_checker'
        tags: [ 'form.type' ]


    App\Form\DataTransformer\ReviewTagToIdArrayTransformer:
        autowire: true
        autoconfigure: true


    App\Form\Type\BookEditType:
        arguments:
            - '@App\Form\DataTransformer\TagsDataTransformer'
            - '@security.authorization_checker'
        tags: [ 'form.type' ]

    Gedmo\Sluggable\SluggableListener:
        tags:
            - { name: doctrine.event_subscriber, connection: default }
